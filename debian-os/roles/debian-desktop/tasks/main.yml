- block:
    - name: GET KERNEL VERSION
      shell: uname -r
      register: kernel_version_output

    - debug: msg="{{ kernel_version_output.stdout }}"

    - name: INSTALL PACKAGES AFTER UPDATES
      ansible.builtin.apt:
        name:
          - linux-headers-{{ kernel_version_output.stdout }}
        state: latest

    - name: INSTALL PACKAGES BASICS
      ansible.builtin.apt:
        name:
          - git
          - vim
          - curl
          - wget
          - make
          - dkms
          - gnupg
          - gnupg-agent
          - lsb-release
          - debsig-verify
          - ca-certificates
          - build-essential
          - apt-transport-https
        state: latest

    - name: INSTALL XFCE CUSTOMIZE
      apt:
        name:
          - xfce4-battery-plugin
          - xfce4-clipman
          - xfce4-clipman-plugin
          - xfce4-cpufreq-plugin
          - xfce4-cpugraph-plugin
          - xfce4-diskperf-plugin
          - xfce4-fsguard-plugin
          - xfce4-indicator-plugin
          - xfce4-mailwatch-plugin
          - xfce4-netload-plugin
          - xfce4-notes
          - xfce4-notes-plugin
          - xfce4-places-plugin
          - xfce4-screenshooter
          - xfce4-screensaver
          - xfce4-sensors-plugin
          - xfce4-smartbookmark-plugin
          - xfce4-systemload-plugin
          - xfce4-taskmanager
          - xfce4-timer-plugin
          - xfce4-verve-plugin
          - xfce4-wavelan-plugin
          - xfce4-weather-plugin
          - xfce4-whiskermenu-plugin
          - xfce4-xkb-plugin
          - lightdm-gtk-greeter-settings
        state: latest

    - name: INSTALL THEMES PACKAGES
      ansible.builtin.apt:
        name:
          - obsidian-icon-theme
          - greybird-gtk-theme
          - elementary-xfce-icon-theme
          - breeze-cursor-theme
        state: latest

    - name: INSTALL INTEL TOOLS AND SENSORS
      apt:
        name:
          - intel-microcode
          - intel-gpu-tools
          - lm-sensors
        state: latest

    - name: INSTALL FIRMWARE META PACKAGES
      apt:
        name:
          - firmware-linux
          - firmware-linux-free
          - firmware-linux-nonfree
          - firmware-atheros
          - firmware-bnx2
          - firmware-bnx2x
          - firmware-iwlwifi
          - firmware-libertas
          - firmware-realtek
          - firmware-samsung
          - firmware-mediatek
          - firmware-intel-graphics
          - mesa-utils
          - mesa-utils-extra
        state: latest

    - name: INSTALL PACKAGES COMPRESS AND UNCOMPRESS
      apt:
        name:
          - bzip2
          - zip
          - unzip
          - unace
          - rar
          - unace-nonfree
          - p7zip
          - p7zip-full
          - p7zip-rar
          - unrar
          - unrar-free
          - cabextract
          - xz-utils
        state: latest

    - name: INSTALL PC TOOL STATUS
      apt:
        name:
          - acpi
          - acpitool
          - tuned
          - tuned-gtk
          - tuned-utils
        state: latest

    - name: INSTALL EXTRA TOOLS
      apt:
        name:
          - pv
          - net-tools
          - speedtest-cli
          - tree
          - locales
          - ethtool
          - hardinfo
          - hwinfo
          - tmux
          - terminator
          - blueman
          - bluez
          - bluetooth
          - mugshot
          - ristretto
          - fdupes
          - pwgen
          - inxi
          - lshw
          - flameshot
          - vim-scripts
          - transmission
          - cheese
          - figlet
          - keepassxc
          - ranger
          - thunderbird
          - thunderbird-l10n-es-es
          - translate-shell
          - network-manager-openvpn
          - network-manager-openvpn-gnome
          - network-manager-ssh
          - network-manager-ssh-gnome
          - network-manager-openconnect
          - network-manager-openconnect-gnome
        state: latest

    - name: INSTALL HDD TOOLS
      apt:
        name:
          - gparted
          - gpart
          - parted
          - ntfs-3g
          - exfat-fuse
          - exfatprogs
          - gnome-disk-utility
          - smartmontools
        state: latest

    - name: INSTALL SSH SERVER
      apt:
        name:
          - ssh
          - rsync
          - openssh-server
          - openssh-client
          - mosh
          - putty
          - putty-tools
          - ssh-askpass
          - ssh-askpass-gnome
        state: latest

    - name: INSTALL FIREWALL
      apt:
        name: ufw
        state: latest

    - name: INSTALL CODECS, SOUND AND VIDEO
      apt:
        name:
          - vlc
          - faac
          - faad
          - ffmpeg
          - vorbis-tools
          - gstreamer1.0-libav
          - gstreamer1.0-plugins-ugly
          - gstreamer1.0-plugins-bad
          - gstreamer1.0-pulseaudio
          - alsa-firmware-loaders
          - alsa-tools
          - alsa-utils
          - obs-studio
          - obs-plugins
        state: latest

